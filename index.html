<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeonFlux AI Video</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f5ff;
            --secondary: #a855f7;
            --text: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, #020617);
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .container { max-width: 480px; margin: 0 auto; padding: 15px; }

        header {
            padding: 20px; text-align: center; border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-top: 20px;
        }

        textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 16px; padding: 15px; color: white; font-size: 1rem; resize: none; margin-bottom: 15px;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select { background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 12px; }

        .btn-gen {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            color: #000; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s;
        }

        .btn-gen:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        #loader { display: none; text-align: center; padding: 30px; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        video { width: 100%; border-radius: 16px; border: 1px solid var(--accent); margin-top: 15px; display: none; }
        
        .history-item { 
            background: var(--glass); padding: 10px; border-radius: 12px; margin-top: 10px; font-size: 0.8rem;
            border-left: 3px solid var(--accent);
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 40px 20px; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEONFLUX AI</div>
        <button onclick="document.getElementById('settings').style.display='block'" style="background:none; border:none; color:white; font-size:1.2rem;"><i class="fas fa-cog"></i></button>
    </header>

    <div class="container">
        <div class="glass-card">
            <textarea id="prompt" rows="3" placeholder="A futuristic city flying through clouds..."></textarea>
            
            <div class="grid">
                <select id="style">
                    <option value="cinematic">Cinematic</option>
                    <option value="anime">Anime</option>
                    <option value="photorealistic">Realistic</option>
                </select>
                <select id="duration">
                    <option value="3">3 Seconds</option>
                </select>
            </div>

            <button id="genBtn" class="btn-gen" onclick="generate()">GENERATE VIDEO</button>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p id="status" style="color: var(--accent);">Requesting AI Access...</p>
        </div>

        <video id="player" controls playsinline></video>

        <div id="history-box">
            <p style="margin-top:20px; font-size:0.8rem; color:gray;">RECENT PROMPTS</p>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings" class="modal">
        <div class="modal-content">
            <h3>API Settings</h3>
            <p style="font-size:0.8rem; color:gray; margin: 10px 0;">Hugging Face API Key:</p>
            <input type="text" id="apiKey" style="width:100%; padding:12px; border-radius:8px; border:none; margin-bottom:15px;">
            <button class="btn-gen" onclick="saveKey()">SAVE KEY</button>
        </div>
    </div>

    <script>
        // Pre-filled Configuration
        const MODEL_ID = "cerspense/zeroscope_v2_576w";
        let API_KEY = localStorage.getItem('hf_key') || "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";

        document.getElementById('apiKey').value = API_KEY;

        function saveKey() {
            API_KEY = document.getElementById('apiKey').value;
            localStorage.setItem('hf_key', API_KEY);
            document.getElementById('settings').style.display = 'none';
        }

        async function generate() {
            const prompt = document.getElementById('prompt').value;
            const style = document.getElementById('style').value;
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const loader = document.getElementById('loader');
            const player = document.getElementById('player');

            if (!prompt) return alert("Please enter a prompt");

            btn.disabled = true;
            loader.style.display = 'block';
            player.style.display = 'none';
            status.innerText = "Connecting to Hugging Face...";

            try {
                // IMPORTANT: Fetch options for browser safety
                const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL_ID}`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ inputs: `${style} style, ${prompt}` }),
                });

                if (response.status === 503) {
                    status.innerText = "Model is loading... retrying in 12s";
                    setTimeout(generate, 12000);
                    return;
                }

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(errorMsg || "API Error");
                }

                const blob = await response.blob();
                const videoUrl = URL.createObjectURL(blob);

                player.src = videoUrl;
                player.style.display = 'block';
                status.innerText = "Generation Successful!";
                
                addHistory(prompt);

            } catch (err) {
                console.error(err);
                alert("FETCH FAILED: " + err.message + "\n\nTip: Make sure you are using HTTPS or a local server, and your API key is active.");
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }

        function addHistory(p) {
            const box = document.getElementById('history-box');
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerText = p;
            box.prepend(div);
        }
    </script>
</body>
</html>
